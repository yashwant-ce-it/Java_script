<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bmi CALCULAOTR</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #cdbfbf;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: #fff;
            padding: 30px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            width: min(90%, 420px);
            text-align: center;
        }

        h1 {
            margin-top: 0;
            color: #111;
            font-size: 24px;
        }

        p {
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            background: #6a1b9a;
            color: white;
            cursor: pointer;
        }

        #result {
            margin-top: 16px;
            color: blueviolet;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>BMI CALCULATOR</h1>
        <p>Enter your weight in kg:</p>
        <input type="number" name="weight" placeholder="weight in kg" id="weight">
        <p>Enter your height in cm:</p>
        <input type="number" name="height" placeholder="height in cm" id="height">
        <button onclick="calculateBMI()">Result</button>
        <p id="result"></p>
    </div>

    <script>
        function calculateBMI() {
            var weight = parseFloat(document.getElementById("weight").value);
            var height = parseFloat(document.getElementById("height").value);

            if (isNaN(weight) || isNaN(height) || weight <= 0 || height <= 0) {
                document.getElementById("result").textContent = "Please enter valid values.";
                return;
            }

            var bmi = weight / ((height / 100) ** 2);
            document.getElementById("result").textContent = "Your BMI is: " + bmi.toFixed(2);
        }
    </script>
</body>
</html>
