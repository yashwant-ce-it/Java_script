		<script>
			;(function () {
				const storageKey = "ui-theme"
				let storedTheme = "system"
				try {
					storedTheme = localStorage.getItem(storageKey) || "system"
				} catch {
					storedTheme = "system"
				}

				let actualTheme

				const allowed = new Set(["light", "dark", "system"])
				if (!allowed.has(storedTheme)) storedTheme = "system"

				if (storedTheme === "system") {
					actualTheme = window.matchMedia("(prefers-color-scheme: dark)")
						.matches
						? "dark"
						: "light"
				} else {
					actualTheme = storedTheme
				}
				document.documentElement.classList.remove("light", "dark")
				document.documentElement.classList.add(actualTheme)
				document.documentElement.setAttribute("data-theme", actualTheme)

				if (actualTheme === "dark") {
					document.documentElement.style.backgroundColor = "hsl(220 7% 9%)"
				} else {
					document.documentElement.style.backgroundColor = "hsl(0 0% 100%)"
				}
			})()
		</script>
